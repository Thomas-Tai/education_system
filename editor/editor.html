<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPT Editor - Professor Slide Design</title>
<style>
:root {
  --cream: #F2EEE5; --cream-soft: #EAE4D5; --cream-line: #DCD4BF;
  --ink: #1B1F24; --ink-muted: #5A5E66; --ink-faint: #6D7079;
  --slate: #3F5B7E; --slate-dark: #2A3B53; --slate-tint: #DDE3EB;
  --accent: #A4452F; --accent-soft: #EFD5CC;
  --ok: #2F6B4A; --warn: #B5781E; --bad: #A33524;
  --ui-font: "Lexend", system-ui, sans-serif;
  --mono: "JetBrains Mono", monospace;
}
@import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--ui-font); background:#1a1a1a; color:var(--cream); overflow:hidden; height:100vh; display:flex; flex-direction:column; }

/* Toolbar */
.toolbar {
  height:48px; background:var(--slate-dark); border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex; align-items:center; padding:0 12px; gap:8px; flex-shrink:0; z-index:100;
}
.toolbar-group { display:flex; align-items:center; gap:4px; }
.toolbar-sep { width:1px; height:24px; background:rgba(255,255,255,0.12); margin:0 6px; }
.toolbar-spacer { flex:1; }
.tb-btn {
  background:transparent; border:1px solid transparent; color:var(--cream); padding:5px 10px;
  border-radius:6px; cursor:pointer; font-family:var(--ui-font); font-size:12px; font-weight:400;
  display:flex; align-items:center; gap:5px; transition:all 0.15s; letter-spacing:0.02em;
}
.tb-btn:hover { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.1); }
.tb-btn:active { background:rgba(255,255,255,0.12); }
.tb-btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.tb-btn.primary:hover { background:#b84e38; }
.tb-btn svg { width:16px; height:16px; fill:currentColor; }
.tb-btn:disabled { opacity:0.35; cursor:default; pointer-events:none; }
.file-name {
  background:transparent; border:1px solid transparent; color:var(--cream); padding:5px 10px;
  border-radius:6px; font-family:var(--ui-font); font-size:13px; font-weight:500;
  min-width:160px; outline:none; transition:border-color 0.15s;
}
.file-name:hover { border-color:rgba(255,255,255,0.15); }
.file-name:focus { border-color:var(--accent); background:rgba(0,0,0,0.2); }

/* Main layout */
.main { flex:1; display:flex; overflow:hidden; }

/* Left sidebar: Slide navigator */
.sidebar-left {
  width:220px; min-width:160px; max-width:360px; background:#141414;
  border-right:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column;
  flex-shrink:0; position:relative;
}
.sidebar-header {
  padding:10px 12px; font-size:11px; font-weight:500; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--ink-faint); border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex; justify-content:space-between; align-items:center;
}
.thumb-list {
  flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:6px;
  scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.1) transparent;
}
.thumb-item {
  position:relative; border-radius:6px; overflow:hidden; cursor:pointer;
  border:2px solid transparent; transition:border-color 0.15s, box-shadow 0.15s;
  aspect-ratio:16/9; background:#0a0a0a;
}
.thumb-item:hover { border-color:rgba(255,255,255,0.2); }
.thumb-item.active { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
.thumb-item.skipped { opacity:0.4; }
.thumb-item.drag-over { border-color:var(--ok); border-style:dashed; }
.thumb-canvas { width:100%; height:100%; object-fit:contain; display:block; }
.thumb-label {
  position:absolute; bottom:0; left:0; right:0; padding:3px 6px;
  background:linear-gradient(transparent, rgba(0,0,0,0.7));
  font-size:9px; color:rgba(255,255,255,0.8); letter-spacing:0.04em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.thumb-num {
  position:absolute; top:3px; left:5px; font-size:9px; font-weight:600;
  color:rgba(255,255,255,0.5); font-family:var(--mono);
}
.add-slide-btn {
  margin:8px; padding:10px; border-radius:6px; border:1px dashed rgba(255,255,255,0.15);
  background:transparent; color:var(--ink-faint); cursor:pointer; font-family:var(--ui-font);
  font-size:12px; display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all 0.15s;
}
.add-slide-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(164,69,47,0.08); }

/* Center: Preview iframe */
.preview-area {
  flex:1; display:flex; align-items:center; justify-content:center;
  background:#0a0a0a; overflow:hidden; position:relative;
}
.preview-area iframe {
  border:none; transform-origin:center center;
  box-shadow:0 4px 40px rgba(0,0,0,0.5);
}
.preview-overlay {
  position:absolute; inset:0; display:none; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.6); z-index:50; color:var(--cream); font-size:14px;
}

/* Right sidebar: Properties */
.sidebar-right {
  width:300px; min-width:240px; max-width:420px; background:#141414;
  border-left:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column;
  flex-shrink:0; overflow-y:auto;
}
.panel-section {
  padding:14px; border-bottom:1px solid rgba(255,255,255,0.06);
}
.panel-title {
  font-size:11px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--ink-faint); margin-bottom:10px;
}
.prop-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.prop-label { font-size:11px; color:var(--ink-faint); min-width:60px; flex-shrink:0; }
.prop-input {
  flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  color:var(--cream); padding:5px 8px; border-radius:4px; font-family:var(--ui-font);
  font-size:12px; outline:none; transition:border-color 0.15s;
}
.prop-input:focus { border-color:var(--accent); }
.prop-input::placeholder { color:rgba(255,255,255,0.25); }
.prop-select {
  flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  color:var(--cream); padding:5px 8px; border-radius:4px; font-family:var(--ui-font);
  font-size:12px; outline:none; cursor:pointer;
}
.prop-select option { background:var(--slate-dark); color:var(--cream); }
.prop-checkbox { accent-color:var(--accent); }
.prop-btn {
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  color:var(--cream); padding:5px 10px; border-radius:4px; cursor:pointer;
  font-family:var(--ui-font); font-size:11px; transition:all 0.15s;
}
.prop-btn:hover { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.2); }
.prop-btn.accent { background:var(--accent); border-color:var(--accent); color:#fff; }
.prop-btn.accent:hover { background:#b84e38; }
.prop-btn.danger { color:var(--bad); border-color:var(--bad); }
.prop-btn.danger:hover { background:rgba(163,53,36,0.15); }
.element-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.element-btn {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
  color:var(--ink-faint); padding:8px 6px; border-radius:4px; cursor:pointer;
  font-family:var(--ui-font); font-size:11px; text-align:center; transition:all 0.15s;
}
.element-btn:hover { background:rgba(255,255,255,0.08); color:var(--cream); border-color:rgba(255,255,255,0.15); }

/* Image panel */
.image-panel textarea {
  width:100%; min-height:80px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  color:var(--cream); padding:8px; border-radius:4px; font-family:var(--ui-font); font-size:11px;
  resize:vertical; outline:none; line-height:1.5; margin-bottom:8px;
}
.image-panel textarea:focus { border-color:var(--accent); }
.image-preview {
  width:100%; aspect-ratio:16/9; background:rgba(255,255,255,0.03);
  border:1px dashed rgba(255,255,255,0.1); border-radius:4px;
  display:flex; align-items:center; justify-content:center; overflow:hidden;
  margin-bottom:8px;
}
.image-preview img { width:100%; height:100%; object-fit:cover; }
.image-preview .placeholder-text { font-size:11px; color:var(--ink-faint); }

/* Template modal */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200;
  display:none; align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.active { display:flex; }
.modal {
  background:var(--slate-dark); border-radius:12px; padding:24px; width:680px; max-width:90vw;
  max-height:80vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.modal h2 { font-size:16px; font-weight:600; color:var(--cream); margin-bottom:16px; letter-spacing:0.02em; }
.modal-close {
  position:absolute; top:16px; right:16px; background:transparent; border:none;
  color:var(--ink-faint); cursor:pointer; font-size:20px; padding:4px;
}
.template-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; }
.template-card {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
  border-radius:8px; padding:12px; cursor:pointer; transition:all 0.15s; text-align:center;
}
.template-card:hover { background:rgba(255,255,255,0.08); border-color:var(--accent); }
.template-card .tmpl-preview {
  aspect-ratio:16/9; background:var(--cream); border-radius:4px; margin-bottom:8px;
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.template-card .tmpl-preview svg { width:80%; height:80%; }
.template-card .tmpl-name { font-size:12px; font-weight:500; color:var(--cream); }
.template-card .tmpl-desc { font-size:10px; color:var(--ink-faint); margin-top:2px; }

/* Context menu */
.ctx-menu {
  position:fixed; z-index:300; background:var(--slate-dark); border:1px solid rgba(255,255,255,0.12);
  border-radius:8px; padding:4px; min-width:160px; box-shadow:0 8px 30px rgba(0,0,0,0.4);
  display:none;
}
.ctx-menu.active { display:block; }
.ctx-item {
  display:block; width:100%; text-align:left; background:transparent; border:none;
  color:var(--cream); padding:7px 12px; border-radius:4px; cursor:pointer;
  font-family:var(--ui-font); font-size:12px; transition:background 0.1s;
}
.ctx-item:hover { background:rgba(255,255,255,0.08); }
.ctx-item.danger { color:var(--bad); }
.ctx-sep { height:1px; background:rgba(255,255,255,0.08); margin:3px 0; }

/* Settings modal */
.settings-grid { display:grid; gap:12px; }
.settings-row { display:flex; align-items:center; gap:12px; }
.settings-row label { font-size:12px; color:var(--cream); min-width:80px; }
.color-input { width:36px; height:28px; border:1px solid rgba(255,255,255,0.15); border-radius:4px; cursor:pointer; background:transparent; padding:0; }

/* Status bar */
.status-bar {
  height:24px; background:var(--slate-dark); border-top:1px solid rgba(255,255,255,0.06);
  display:flex; align-items:center; padding:0 12px; gap:16px; flex-shrink:0;
  font-size:10px; color:var(--ink-faint); letter-spacing:0.04em;
}
.status-dot { width:6px; height:6px; border-radius:50%; background:var(--ok); }
.status-dot.dirty { background:var(--warn); }
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-group">
    <span style="font-size:14px; font-weight:600; color:var(--accent); letter-spacing:-0.02em;">Slide</span>
    <span style="font-size:14px; font-weight:300; color:var(--cream); letter-spacing:-0.02em; margin-right:4px;">Editor</span>
  </div>
  <div class="toolbar-sep"></div>
  <input class="file-name" id="fileName" value="Untitled.html" spellcheck="false">
  <div class="toolbar-spacer"></div>
  <div class="toolbar-group">
    <button class="tb-btn" id="btnUndo" title="復原 (Ctrl+Z)" disabled>
      <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
    </button>
    <button class="tb-btn" id="btnRedo" title="重做 (Ctrl+Shift+Z)" disabled>
      <svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
    </button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tb-btn" id="btnPreview" title="預覽模式">
      <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
      預覽
    </button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tb-btn primary" id="btnSave" title="儲存 (Ctrl+S)">
      <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
      儲存
    </button>
    <button class="tb-btn" id="btnLoad" title="載入 HTML">
      <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
      載入
    </button>
    <button class="tb-btn" id="btnPrint" title="列印">
      <svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
    </button>
    <button class="tb-btn" id="btnSettings" title="全域設定">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>
  </div>
</div>

<!-- Main layout -->
<div class="main">
  <!-- Left sidebar: Slide navigator -->
  <div class="sidebar-left" id="sidebarLeft">
    <div class="sidebar-header">
      <span>投影片</span>
      <span id="slideCount">0 / 0</span>
    </div>
    <div class="thumb-list" id="thumbList"></div>
    <button class="add-slide-btn" id="btnAddSlide">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      新增投影片
    </button>
  </div>

  <!-- Center: Preview iframe -->
  <div class="preview-area" id="previewArea">
    <iframe id="deckFrame" width="1920" height="1080"></iframe>
    <div class="preview-overlay" id="previewOverlay">
      按 Esc 退出預覽模式
    </div>
  </div>

  <!-- Right sidebar: Properties -->
  <div class="sidebar-right" id="sidebarRight">
    <!-- Slide properties -->
    <div class="panel-section" id="panelSlideProps">
      <div class="panel-title">投影片屬性</div>
      <div class="prop-row">
        <span class="prop-label">標題</span>
        <input class="prop-input" id="propLabel" placeholder="投影片標籤">
      </div>
      <div class="prop-row">
        <span class="prop-label">深色</span>
        <input type="checkbox" class="prop-checkbox" id="propDark">
      </div>
      <div class="prop-row" style="margin-top:12px;">
        <button class="prop-btn" id="btnDuplicate">複製</button>
        <button class="prop-btn danger" id="btnDeleteSlide">刪除</button>
      </div>
    </div>

    <!-- Insert elements -->
    <div class="panel-section" id="panelElements">
      <div class="panel-title">插入元素</div>
      <div class="element-grid">
        <button class="element-btn" data-element="card">卡片 Card</button>
        <button class="element-btn" data-element="pill">標籤 Pill</button>
        <button class="element-btn" data-element="kpi">數字 KPI</button>
        <button class="element-btn" data-element="grid2">雙欄 Grid-2</button>
        <button class="element-btn" data-element="grid3">三欄 Grid-3</button>
        <button class="element-btn" data-element="grid4">四欄 Grid-4</button>
        <button class="element-btn" data-element="quiz">測驗 Quiz</button>
        <button class="element-btn" data-element="keypoint">記憶點</button>
        <button class="element-btn" data-element="image">圖片</button>
        <button class="element-btn" data-element="code">程式碼</button>
        <button class="element-btn" data-element="table">表格</button>
        <button class="element-btn" data-element="formula">公式框</button>
      </div>
    </div>

    <!-- Image generation -->
    <div class="panel-section image-panel" id="panelImage">
      <div class="panel-title">AI 配圖</div>
      <div class="image-preview" id="imagePreview">
        <span class="placeholder-text">尚未生成圖片</span>
      </div>
      <textarea id="imagePrompt" placeholder="圖片描述 (Prompt)...&#10;&#10;例如：Educational illustration of neural network architecture, clean flat design, no text"></textarea>
      <div class="prop-row">
        <span class="prop-label">模型</span>
        <select class="prop-select" id="imageModel">
          <option value="gpt-image-2-ssvip">GPT Image 2 (SSVIP)</option>
          <option value="gpt-image-2-03">GPT Image 2 (03)</option>
          <option value="gpt-image-2">GPT Image 2</option>
        </select>
      </div>
      <div class="prop-row">
        <span class="prop-label">尺寸</span>
        <select class="prop-select" id="imageSize">
          <option value="1536x1024">1536x1024 (16:9)</option>
          <option value="1024x1024">1024x1024 (1:1)</option>
          <option value="auto">auto</option>
        </select>
      </div>
      <div class="prop-row">
        <button class="prop-btn accent" id="btnGenImage" style="flex:1;">生成圖片</button>
        <button class="prop-btn" id="btnCopyPrompt" title="複製 Prompt">複製</button>
      </div>
      <div class="prop-row" style="margin-top:4px;">
        <span class="prop-label">API Key</span>
        <input class="prop-input" id="apiKey" type="password" placeholder="DMXAPI Key (選填)">
      </div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">就緒</span>
  <span style="margin-left:auto;" id="statusSlide">-</span>
</div>

<!-- Template modal -->
<div class="modal-overlay" id="templateModal">
  <div class="modal">
    <h2>選擇投影片模板</h2>
    <div class="template-grid" id="templateGrid"></div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal" style="width:420px;">
    <h2>全域設定</h2>
    <div class="settings-grid">
      <div class="settings-row">
        <label>強調色</label>
        <input type="color" class="color-input" id="settingsAccent" value="#A4452F">
        <span style="font-size:11px; color:var(--ink-faint);" id="accentHex">#A4452F</span>
      </div>
      <div class="settings-row">
        <label>字型</label>
        <select class="prop-select" id="settingsFont" style="max-width:200px;">
          <option value="Noto Sans HK">Noto Sans HK</option>
          <option value="Noto Sans TC">Noto Sans TC</option>
          <option value="Atkinson Hyperlegible">Atkinson Hyperlegible</option>
          <option value="Lexend">Lexend</option>
        </select>
      </div>
      <div class="settings-row">
        <label>進度條</label>
        <input type="checkbox" class="prop-checkbox" id="settingsRail" checked>
      </div>
    </div>
    <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:8px;">
      <button class="prop-btn" id="btnSettingsCancel">取消</button>
      <button class="prop-btn accent" id="btnSettingsApply">套用</button>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu">
  <button class="ctx-item" data-action="duplicate">複製投影片</button>
  <button class="ctx-item" data-action="moveUp">上移</button>
  <button class="ctx-item" data-action="moveDown">下移</button>
  <div class="ctx-sep"></div>
  <button class="ctx-item" data-action="skip">跳過</button>
  <button class="ctx-item" data-action="unskip">取消跳過</button>
  <div class="ctx-sep"></div>
  <button class="ctx-item danger" data-action="delete">刪除</button>
</div>

<!-- Load file input -->
<input type="file" id="fileInput" accept=".html" style="display:none;">

<!-- Scripts -->
<script src="templates.js"></script>
<script src="image-panel.js"></script>
<script src="editor.js"></script>
</body>
</html>
