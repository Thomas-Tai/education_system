quotes:
  opening:
    text: "AI 讓答案變得廉價，讓問題變得珍貴。<br>學習的本質，從「懂不懂」轉向了「知不知」。"
  closing:
    text: >
      第一性原理確保方向正確，蘇格拉底提問確保理解深入，<br>
      雙向費曼確保知識可靠，作品導向確保能力落地。<br><br>
      不要讓 AI 成為你的答案機器，讓它成為你製造工具的工具。
