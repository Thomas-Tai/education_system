  title: "讓 AI 重啟學習｜第一性原理 × 蘇格拉底提問 × 雙向費曼 × 作品導向"
  description: "AI 時代的學習不是「學更多」，而是「學得更深、產出更快」。透過四步框架打造你的個人知識飛輪。"
